<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#38ff14",
                        "background-light": "#f6f8f5",
                        "background-dark": "#12230f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(56, 255, 20, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 255, 20, 0.1);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
<!-- Top Navigation Bar -->
<header class="w-full max-w-5xl px-6 py-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">terminal</span>
</div>
<h1 class="text-xl font-bold tracking-tight">LeetFlix</h1>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 bg-primary/10 px-3 py-1.5 rounded-full border border-primary/20">
<span class="material-symbols-outlined text-primary text-sm">timer</span>
<span class="text-sm font-mono font-bold text-primary">04:22</span>
</div>
<button class="p-2 rounded-lg bg-slate-100 dark:bg-primary/5 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 w-full max-w-2xl px-6 py-12 flex flex-col justify-center">
<!-- Progress Section -->
<div class="mb-8 space-y-3">
<div class="flex justify-between items-end">
<div>
<span class="text-xs font-bold uppercase tracking-widest text-primary">Current Stage</span>
<h2 class="text-lg font-medium">Question 3 of 10</h2>
</div>
<span class="text-sm font-medium opacity-70">30% Complete</span>
</div>
<div class="h-1.5 w-full bg-slate-200 dark:bg-primary/10 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 30%;"></div>
</div>
</div>
<!-- Question Card -->
<div class="glass-card rounded-xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
<!-- Subtle background pattern -->
<div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="relative z-10">
<p class="text-xs font-semibold text-primary/60 mb-4 uppercase tracking-tighter">Algorithm &amp; Complexity</p>
<h3 class="text-2xl md:text-3xl font-bold leading-tight mb-10">
                    What is the O(n) complexity of a binary search?
                </h3>
<div class="grid grid-cols-1 gap-4">
<button class="group flex items-center justify-between w-full p-5 rounded-lg border border-slate-200 dark:border-primary/10 bg-white/5 hover:bg-primary/5 hover:border-primary/30 transition-all text-left">
<div class="flex items-center gap-4">
<span class="w-8 h-8 flex items-center justify-center rounded bg-slate-100 dark:bg-primary/10 group-hover:bg-primary/20 text-sm font-bold">A</span>
<span class="text-lg">O(n)</span>
</div>
</button>
<button class="group flex items-center justify-between w-full p-5 rounded-lg border-2 border-primary bg-primary/10 text-left shadow-[0_0_15px_rgba(56,255,20,0.1)]">
<div class="flex items-center gap-4">
<span class="w-8 h-8 flex items-center justify-center rounded bg-primary text-background-dark text-sm font-bold">B</span>
<span class="text-lg font-semibold">O(log n)</span>
</div>
<span class="material-symbols-outlined text-primary">check_circle</span>
</button>
<button class="group flex items-center justify-between w-full p-5 rounded-lg border border-slate-200 dark:border-primary/10 bg-white/5 hover:bg-primary/5 hover:border-primary/30 transition-all text-left">
<div class="flex items-center gap-4">
<span class="w-8 h-8 flex items-center justify-center rounded bg-slate-100 dark:bg-primary/10 group-hover:bg-primary/20 text-sm font-bold">C</span>
<span class="text-lg">O(n log n)</span>
</div>
</button>
<button class="group flex items-center justify-between w-full p-5 rounded-lg border border-slate-200 dark:border-primary/10 bg-white/5 hover:bg-primary/5 hover:border-primary/30 transition-all text-left">
<div class="flex items-center gap-4">
<span class="w-8 h-8 flex items-center justify-center rounded bg-slate-100 dark:bg-primary/10 group-hover:bg-primary/20 text-sm font-bold">D</span>
<span class="text-lg">O(1)</span>
</div>
</button>
</div>
</div>
</div>
<!-- Action Footer -->
<div class="mt-10 flex items-center justify-between">
<button class="flex items-center gap-2 text-sm font-semibold opacity-50 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-lg">flag</span>
                Report Issue
            </button>
<button class="bg-primary text-background-dark px-8 py-3 rounded-lg font-bold flex items-center gap-2 hover:shadow-[0_0_20px_rgba(56,255,20,0.4)] transition-all">
                Next Question
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<!-- Footer Stats -->
<footer class="w-full max-w-5xl px-6 py-8 grid grid-cols-3 gap-4 border-t border-slate-200 dark:border-primary/10 opacity-60">
<div class="text-center">
<p class="text-xs uppercase tracking-widest font-bold text-primary">Accuracy</p>
<p class="text-lg font-mono">85%</p>
</div>
<div class="text-center">
<p class="text-xs uppercase tracking-widest font-bold text-primary">Avg. Time</p>
<p class="text-lg font-mono">14s</p>
</div>
<div class="text-center">
<p class="text-xs uppercase tracking-widest font-bold text-primary">Rank</p>
<p class="text-lg font-mono">#1,204</p>
</div>
</footer>
</body></html>
